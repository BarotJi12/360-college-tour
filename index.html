<!DOCTYPE html>
<html>
<head>
<title>College Virtual Tour</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#panorama{
width:100%;
height:100vh;
}

/* MENU */

.menu-container{
position:absolute;
top:15px;
left:15px;
z-index:10;
background:rgba(0,0,0,0.65);
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
display:inline-block;
overflow:hidden;
backdrop-filter:blur(8px);
}

.menu-icon{
font-size:26px;
color:white;
padding:8px 12px;
cursor:pointer;
}

.menu{
max-height:0;
overflow:hidden;
transition:max-height 0.35s ease;
}

.menu div{
color:white;
padding:10px 16px;
cursor:pointer;
}

.menu div:hover{
background:rgba(255,255,255,0.1);
}

.menu-container:hover .menu{
max-height:120px;
}

/* TITLE */

.scene-title{
position:absolute;
top:15px;
right:20px;
color:white;
font-size:18px;
background:rgba(0,0,0,0.55);
padding:6px 12px;
border-radius:6px;
backdrop-filter:blur(6px);
z-index:10;
transition:transform 0.4s ease, opacity 0.4s ease;
}

.title-out{
transform:translateX(120%);
opacity:0;
}

.title-in{
transform:translateX(0);
opacity:1;
}

/* CONTROLS */

.controls{
position:absolute;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

.controls button{
width:40px;
height:40px;
border:none;
border-radius:8px;
background:rgba(0,0,0,0.6);
color:white;
font-size:18px;
cursor:pointer;
}

.controls button:hover{
background:#2196f3;
}

</style>
</head>

<body>

<div class="menu-container">
<div class="menu-icon">☰</div>

<div class="menu">
<div onclick="viewer.loadScene('classroom')">Classroom</div>
<div onclick="viewer.loadScene('lab')">Project Lab</div>
</div>
</div>

<div class="scene-title" id="sceneTitle">Classroom</div>

<div id="panorama"></div>

<div class="controls">
<button onclick="viewer.setHfov(viewer.getHfov() - 10)">+</button>
<button onclick="viewer.setHfov(viewer.getHfov() + 10)">-</button>
<button onclick="viewer.toggleFullscreen()">⛶</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<script>

var viewer = pannellum.viewer('panorama',{

"default": {
    "firstScene": "classroom",
    "sceneFadeDuration": 1000,
    "autoLoad": true,
    "autoRotate": -2,
    "autoRotateInactivityDelay": 3000,
    "showControls": false,
    "showSceneTitle": false
},

"scenes": {

"classroom": {
    "type": "equirectangular",
    "panorama": "classroom.jpeg"
},

"lab": {
    "type": "equirectangular",
    "panorama": "projectlab.jpeg"
}

}

});


/* TITLE ANIMATION */

viewer.on('scenechange', function(scene){

let title = document.getElementById("sceneTitle")

title.classList.remove("title-in","title-out")
void title.offsetWidth

title.classList.add("title-out")

setTimeout(function(){

if(scene === "classroom"){
title.innerText = "Classroom"
}

if(scene === "lab"){
title.innerText = "Project Lab"
}

title.classList.remove("title-out")
title.classList.add("title-in")

},400)

});

</script>

</body>
</html>
